name: TESTING - interchaintest

on:
  pull_request:

jobs:
  module-contract:
    runs-on: ubuntu-latest
    steps:
      - name: checkout relayer
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - name: Verify isolated interchaintest module
        run: make interchaintest-contract

  events:
    needs: module-contract
    runs-on: ubuntu-latest
    steps:
      - name: checkout relayer
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: interchaintest
        run: make interchaintest-events

  legacy:
    needs: module-contract
    runs-on: ubuntu-latest
    steps:
      - name: checkout relayer
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: interchaintest
        run: make interchaintest-legacy

  multiple-paths:
    needs: module-contract
    runs-on: ubuntu-latest
    steps:
      - name: checkout relayer
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: interchaintest
        run: make interchaintest-multiple

  misbehaviour:
    needs: module-contract
    runs-on: ubuntu-latest
    steps:
      - name: checkout relayer
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: interchaintest
        run: make interchaintest-misbehaviour

  fee-middleware:
    needs: module-contract
    runs-on: ubuntu-latest
    steps:
      - name: checkout relayer
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: interchaintest
        run: make interchaintest-fee-middleware

  fee-grant:
    needs: module-contract
    runs-on: ubuntu-latest
    steps:
      - name: checkout relayer
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: interchaintest
        run: make interchaintest-fee-grant

  docker-events:
    needs: module-contract
    runs-on: ubuntu-latest
    steps:
      - name: checkout relayer
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - name: Docker event-processor conformance
        run: make interchaintest-docker-events

  docker-legacy:
    needs: module-contract
    runs-on: ubuntu-latest
    steps:
      - name: checkout relayer
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - name: Docker legacy-processor conformance
        run: make interchaintest-docker-legacy

  prepare-scenario-matrix:
    needs: module-contract
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - name: Generate matrix
        id: set-matrix
        run: |
          set -euo pipefail
          # Run the command and convert its output to a JSON array
          TESTS=$(cd interchaintest && go test -list ^TestScenario ./... | grep -v "^ok " | grep -v "proto: duplicate proto type registered" | jq -R -s -c 'split("\n")[:-1]')
          test "$TESTS" != "[]"
          echo "matrix=${TESTS}" >> $GITHUB_OUTPUT
  
  # Note : This job will not start until prepare-scenario-matrix completes sucessfully
  scenarios:
    needs: [module-contract, prepare-scenario-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: ${{fromJson(needs.prepare-scenario-matrix.outputs.matrix)}}

    steps:
      - name: checkout relayer
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: interchaintest
        env:
          TEST_NAME: ${{ matrix.test }}
        run: |
          cd interchaintest
          go test -timeout 30m -race -v -run "^${TEST_NAME}$" ./...
